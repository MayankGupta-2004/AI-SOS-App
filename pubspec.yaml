name: mobile_app
description: Kavach — AI powered SOS emergency detection system
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # AI / ML
  tflite_flutter: ^0.12.1

  # Speech recognition
  speech_to_text: ^7.3.0

  # Audio recording
  record: ^6.0.0

  # Audio playback (siren)
  just_audio: ^0.9.46

  # Location
  geolocator: ^11.0.0

  # SMS
  flutter_background_messenger: ^0.0.2

  # HTTP (server ping)
  http: ^1.2.0

  # Device info
  device_info_plus: ^10.1.0

  # Local storage
  shared_preferences: ^2.2.2

  # File paths
  path_provider: ^2.1.2

  # ✅ Runtime permission requests
  permission_handler: ^11.3.1

  cupertino_icons: ^1.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/models/
    - assets/sounds/siren.mp3