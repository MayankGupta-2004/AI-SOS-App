name: mobile_app
description: Kavach — AI powered SOS emergency detection system
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # AI / ML
  tflite_flutter: ^0.12.1

  # speech_to_text REMOVED — replaced by native Android SpeechService
  # that runs as a foreground service and works when app is backgrounded

  # Location
  geolocator: ^11.0.0

  # SMS
  flutter_background_messenger: ^0.0.2

  # HTTP (server ping)
  http: ^1.2.0

  # Device info
  device_info_plus: ^10.1.0

  # Local storage
  shared_preferences: ^2.2.2

  # File paths
  path_provider: ^2.1.2

  # Permissions
  permission_handler: ^11.3.1

  # Push notifications
  flutter_local_notifications: ^17.2.3

  cupertino_icons: ^1.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/models/
    - assets/sounds/siren.mp3